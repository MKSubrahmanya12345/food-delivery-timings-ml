services:
  # ML Service (Python/Flask)
  - type: web
    name: deliverease-ml
    env: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Backend (Node.js/Express)
  - type: web
    name: deliverease-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          name: deliverease-ml
          type: web
          property: host

  # Frontend (Static Site)
  - type: web
    name: deliverease-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: deliverease-backend
          type: web
          property: host
        suffix: /api

